apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-deals-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-deals
  template:
    metadata:
      labels:
        app: price-deals
    spec:
      containers:
      - name: web
        image: pricedealsacr.azurecr.io/price-deals-web:latest
        ports:
        - containerPort: 10000
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: mongo-uri
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: secret-key
        - name: REFRESH_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: refresh-secret-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 10000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 10000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: price-deals-service
spec:
  selector:
    app: price-deals
  ports:
  - protocol: TCP
    port: 80
    targetPort: 10000
  type: LoadBalancer